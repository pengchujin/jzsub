<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">JZSub</title>
  <desc id="desc">为横屏和竖屏视频自动生成最高画质双语字幕 MP4</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#fbfffd"/>
      <stop offset="1" stop-color="#eefbf7"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#72d9ba"/>
      <stop offset="1" stop-color="#a9e9d5"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#e7f9f2"/>
      <stop offset="0.48" stop-color="#c9eee2"/>
      <stop offset="1" stop-color="#dff4fb"/>
    </linearGradient>
    <radialGradient id="halo">
      <stop stop-color="#a8ecd7" stop-opacity=".45"/>
      <stop offset="1" stop-color="#79d9b7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#6e9e8f" stroke-opacity=".06"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#5f9f8a" flood-opacity=".14"/>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#background)"/>
  <rect width="1280" height="420" rx="28" fill="url(#grid)"/>
  <circle cx="1080" cy="50" r="280" fill="url(#halo)"/>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
    <g transform="translate(66 50)">
      <rect width="190" height="34" rx="17" fill="#eaf9f3"/>
      <circle cx="20" cy="17" r="5" fill="#10a37f"/>
      <text x="34" y="23" fill="#17634f" font-size="13" font-weight="700" letter-spacing="1.2">VIDEO → BILINGUAL MP4</text>

      <text x="0" y="112" fill="#20332d" font-size="76" font-weight="750" letter-spacing="-3">JZSub</text>
      <text x="0" y="160" fill="#26332e" font-size="27" font-weight="650">一条链接，交付可直接观看的双语视频</text>
      <text x="0" y="198" fill="#65716c" font-size="18">最高画质下载 · GPT 翻译 · 原文锁定 · 封面获取 · 字幕烧录</text>

      <g transform="translate(0 228)" font-size="15" font-weight="650">
        <rect width="112" height="38" rx="19" fill="#e6f4ef"/>
        <text x="56" y="25" fill="#31564a" text-anchor="middle">横屏适配</text>
        <rect x="122" width="112" height="38" rx="19" fill="url(#mint)"/>
        <text x="178" y="25" fill="#185c49" text-anchor="middle">竖屏适配</text>
        <rect x="244" width="112" height="38" rx="19" fill="#edf5fb"/>
        <text x="300" y="25" fill="#26332e" text-anchor="middle">双语字幕</text>
      </g>

      <g transform="translate(0 296)">
        <rect width="470" height="1" fill="#d8dedb"/>
        <circle cx="8" cy="24" r="5" fill="#10a37f"/>
        <text x="24" y="30" fill="#65716c" font-size="14">YouTube · Bilibili · TikTok · Vimeo · 更多平台</text>
      </g>
    </g>

    <g filter="url(#shadow)">
      <g transform="translate(700 91)">
        <rect width="382" height="238" rx="22" fill="#f8fffc" stroke="#b9ddd1" stroke-width="2"/>
        <rect x="9" y="9" width="364" height="204" rx="15" fill="url(#screen)"/>
        <path d="M9 154L105 91L180 138L269 63L373 118V213H9Z" fill="#ffffff" fill-opacity=".5"/>
        <circle cx="300" cy="58" r="32" fill="#ffffff" fill-opacity=".72"/>
        <rect x="28" y="28" width="54" height="25" rx="12.5" fill="#fff" fill-opacity=".9"/>
        <text x="55" y="46" fill="#1b4d3f" font-size="12" font-weight="750" text-anchor="middle">16:9</text>
        <g text-anchor="middle" font-weight="700">
          <rect x="79" y="139" width="224" height="53" rx="9" fill="#ffffff" fill-opacity=".9"/>
          <text x="191" y="160" fill="#355249" font-size="14">Make every video easier to understand</text>
          <text x="191" y="181" fill="#138265" font-size="16">让每个视频都更容易理解</text>
        </g>
        <rect x="144" y="220" width="94" height="5" rx="2.5" fill="#bad9ce"/>
      </g>

      <g transform="translate(1028 37)">
        <rect width="176" height="332" rx="30" fill="#f8fffc" stroke="#b9ddd1" stroke-width="2"/>
        <rect x="8" y="8" width="160" height="316" rx="23" fill="url(#screen)"/>
        <path d="M8 220L61 144L105 189L168 108V324H8Z" fill="#ffffff" fill-opacity=".48"/>
        <circle cx="137" cy="73" r="34" fill="#ffffff" fill-opacity=".68"/>
        <rect x="61" y="16" width="54" height="18" rx="9" fill="#d3e9e1"/>
        <rect x="20" y="48" width="48" height="24" rx="12" fill="#fff" fill-opacity=".9"/>
        <text x="44" y="65" fill="#1b4d3f" font-size="12" font-weight="750" text-anchor="middle">9:16</text>
        <g text-anchor="middle" font-weight="700">
          <rect x="18" y="231" width="140" height="69" rx="9" fill="#ffffff" fill-opacity=".92"/>
          <text x="88" y="252" fill="#355249" font-size="11">Portrait subtitles</text>
          <text x="88" y="268" fill="#355249" font-size="11">stay clear and readable</text>
          <text x="88" y="290" fill="#138265" font-size="14">竖屏字幕清晰易读</text>
        </g>
      </g>
    </g>

    <g transform="translate(754 352)">
      <path d="M0 0H414" stroke="#cbd8d2"/>
      <circle cx="5" cy="20" r="4" fill="#10a37f"/>
      <text x="18" y="26" fill="#52615b" font-size="14" font-weight="650">自动识别画幅 · 字号、换行与安全区自适应</text>
    </g>
  </g>
</svg>
