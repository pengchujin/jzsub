<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">JZSub</title>
  <desc id="desc">暖色晨光背景中的横屏与竖屏双语字幕视频</desc>
  <defs>
    <linearGradient id="daybreak" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffbd8c"/>
      <stop offset=".52" stop-color="#ffa982"/>
      <stop offset="1" stop-color="#f6a98f"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff2cf" stop-opacity=".52"/>
      <stop offset=".48" stop-color="#ffd0b0" stop-opacity=".34"/>
      <stop offset="1" stop-color="#fff7e8" stop-opacity=".5"/>
    </linearGradient>
    <filter id="softBlur" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <filter id="deviceShadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#b65d43" flood-opacity=".16"/>
    </filter>
    <clipPath id="canvasClip"><rect width="1280" height="420" rx="28"/></clipPath>
  </defs>

  <g clip-path="url(#canvasClip)">
    <rect width="1280" height="420" fill="url(#daybreak)"/>
    <ellipse cx="75" cy="55" rx="190" ry="125" fill="#ffdf7e" fill-opacity=".82" filter="url(#softBlur)"/>
    <ellipse cx="330" cy="395" rx="190" ry="150" fill="#ff8e65" fill-opacity=".58" filter="url(#softBlur)"/>
    <ellipse cx="670" cy="185" rx="250" ry="150" fill="#ffc79d" fill-opacity=".38" filter="url(#softBlur)"/>
    <path d="M1080-60C1190 70 1110 180 1205 275C1260 330 1290 380 1320 470" fill="none" stroke="#ffd66f" stroke-width="86" stroke-linecap="round" stroke-opacity=".72" filter="url(#softBlur)"/>
    <path d="M930 450C900 330 980 250 940 135" fill="none" stroke="#ff8c73" stroke-width="105" stroke-linecap="round" stroke-opacity=".38" filter="url(#softBlur)"/>

    <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
      <g transform="translate(66 50)">
        <rect width="190" height="34" rx="17" fill="#fff" fill-opacity=".2" stroke="#fff" stroke-opacity=".34"/>
        <circle cx="20" cy="17" r="5" fill="#fff"/>
        <text x="34" y="23" fill="#fff" font-size="13" font-weight="700" letter-spacing="1.2">VIDEO → BILINGUAL MP4</text>

        <text x="0" y="112" fill="#fff" font-size="76" font-weight="750" letter-spacing="-3">JZSub</text>
        <text x="0" y="160" fill="#fff" font-size="27" font-weight="650">一条链接，交付可直接观看的双语视频</text>
        <text x="0" y="198" fill="#fff8f3" font-size="18">最高画质下载 · GPT 翻译 · 原文锁定 · 封面获取 · 字幕烧录</text>

        <g transform="translate(0 228)" font-size="15" font-weight="650">
          <rect width="112" height="38" rx="19" fill="#fff" fill-opacity=".18" stroke="#fff" stroke-opacity=".3"/>
          <text x="56" y="25" fill="#fff" text-anchor="middle">横屏适配</text>
          <rect x="122" width="112" height="38" rx="19" fill="#ffe48e" fill-opacity=".62" stroke="#fff" stroke-opacity=".28"/>
          <text x="178" y="25" fill="#8c513d" text-anchor="middle">竖屏适配</text>
          <rect x="244" width="112" height="38" rx="19" fill="#fff" fill-opacity=".18" stroke="#fff" stroke-opacity=".3"/>
          <text x="300" y="25" fill="#fff" text-anchor="middle">双语字幕</text>
        </g>

        <g transform="translate(0 296)">
          <rect width="470" height="1" fill="#fff" fill-opacity=".4"/>
          <circle cx="8" cy="24" r="5" fill="#fff"/>
          <text x="24" y="30" fill="#fff8f3" font-size="14">YouTube · Bilibili · TikTok · Vimeo · 更多平台</text>
        </g>
      </g>

      <g filter="url(#deviceShadow)">
        <g transform="translate(700 91)">
          <rect width="382" height="238" rx="22" fill="#fff" fill-opacity=".26" stroke="#fff" stroke-opacity=".7" stroke-width="2"/>
          <rect x="9" y="9" width="364" height="204" rx="15" fill="url(#screenGlow)"/>
          <path d="M9 154L105 91L180 138L269 63L373 118V213H9Z" fill="#fff" fill-opacity=".22"/>
          <circle cx="300" cy="58" r="32" fill="#fff" fill-opacity=".42"/>
          <rect x="28" y="28" width="54" height="25" rx="12.5" fill="#fff" fill-opacity=".86"/>
          <text x="55" y="46" fill="#a45d45" font-size="12" font-weight="750" text-anchor="middle">16:9</text>
          <g text-anchor="middle" font-weight="700">
            <rect x="79" y="139" width="224" height="53" rx="9" fill="#fff" fill-opacity=".88"/>
            <text x="191" y="160" fill="#80503f" font-size="14">Make every video easier to understand</text>
            <text x="191" y="181" fill="#e06f4c" font-size="16">让每个视频都更容易理解</text>
          </g>
          <rect x="144" y="220" width="94" height="5" rx="2.5" fill="#fff" fill-opacity=".62"/>
        </g>

        <g transform="translate(1028 37)">
          <rect width="176" height="332" rx="30" fill="#fff" fill-opacity=".28" stroke="#fff" stroke-opacity=".72" stroke-width="2"/>
          <rect x="8" y="8" width="160" height="316" rx="23" fill="url(#screenGlow)"/>
          <path d="M8 220L61 144L105 189L168 108V324H8Z" fill="#fff" fill-opacity=".22"/>
          <circle cx="137" cy="73" r="34" fill="#fff" fill-opacity=".4"/>
          <rect x="61" y="16" width="54" height="18" rx="9" fill="#fff" fill-opacity=".42"/>
          <rect x="20" y="48" width="48" height="24" rx="12" fill="#fff" fill-opacity=".86"/>
          <text x="44" y="65" fill="#a45d45" font-size="12" font-weight="750" text-anchor="middle">9:16</text>
          <g text-anchor="middle" font-weight="700">
            <rect x="18" y="231" width="140" height="69" rx="9" fill="#fff" fill-opacity=".9"/>
            <text x="88" y="252" fill="#80503f" font-size="11">Portrait subtitles</text>
            <text x="88" y="268" fill="#80503f" font-size="11">stay clear and readable</text>
            <text x="88" y="290" fill="#e06f4c" font-size="14">竖屏字幕清晰易读</text>
          </g>
        </g>
      </g>

      <g transform="translate(754 352)">
        <path d="M0 0H414" stroke="#fff" stroke-opacity=".48"/>
        <circle cx="5" cy="20" r="4" fill="#fff"/>
        <text x="18" y="26" fill="#fff" font-size="14" font-weight="650">自动识别画幅 · 字号、换行与安全区自适应</text>
      </g>
    </g>
  </g>
</svg>
