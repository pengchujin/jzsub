<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="650" viewBox="0 0 1280 650" role="img" aria-labelledby="title desc">
  <title id="title">在 Codex 中使用 JZSub</title>
  <desc id="desc">安装 Skill 后发送 jzsub 和视频链接 自动完成下载 翻译与字幕烧录</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111827"/><stop offset="1" stop-color="#0b2530"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-opacity=".22"/></filter>
  </defs>
  <rect width="1280" height="650" rx="28" fill="#eef3f7"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
    <rect x="48" y="40" width="1184" height="570" rx="22" fill="white" filter="url(#shadow)"/>
    <rect x="48" y="40" width="1184" height="58" rx="22" fill="url(#panel)"/>
    <rect x="48" y="78" width="1184" height="20" fill="url(#panel)"/>
    <circle cx="78" cy="69" r="7" fill="#ff6b6b"/><circle cx="100" cy="69" r="7" fill="#ffd66b"/><circle cx="122" cy="69" r="7" fill="#63d98b"/>
    <text x="640" y="77" fill="white" font-size="20" font-weight="700" text-anchor="middle">Codex · JZSub</text>

    <text x="90" y="142" fill="#526475" font-size="17" font-weight="700">1 · 安装到本地 Skills</text>
    <rect x="90" y="160" width="1100" height="74" rx="14" fill="#101827"/>
    <text x="118" y="191" fill="#7dd3fc" font-size="17" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">git clone https://github.com/pengchujin/jzsub.git</text>
    <text x="118" y="217" fill="#a7f3d0" font-size="17" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">cp -R jzsub/skills/jzsub ~/.codex/skills/</text>

    <text x="90" y="278" fill="#526475" font-size="17" font-weight="700">2 · 在 Codex 发送视频链接</text>
    <rect x="90" y="296" width="785" height="78" rx="18" fill="#e9f6ff" stroke="#b8e2ff"/>
    <circle cx="124" cy="335" r="20" fill="#0b6bcb"/>
    <text x="124" y="342" fill="white" font-size="20" font-weight="800" text-anchor="middle">你</text>
    <text x="158" y="342" fill="#12314d" font-size="20" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">$jzsub https://www.youtube.com/watch?v=...</text>

    <text x="90" y="418" fill="#526475" font-size="17" font-weight="700">3 · 等待自动交付</text>
    <rect x="90" y="436" width="1100" height="126" rx="18" fill="#f5f8fa" stroke="#dbe5eb"/>
    <circle cx="126" cy="476" r="22" fill="#0e2838"/><text x="126" y="483" fill="#77e2c2" font-size="18" font-weight="800" text-anchor="middle">JZ</text>
    <g font-size="18" fill="#263b4a">
      <text x="168" y="470">✓ 最高画质视频与封面已保存</text>
      <text x="168" y="503">✓ 原文字幕已锁定  GPT 中文翻译已完成</text>
      <text x="168" y="536">✓ 双语字幕已烧录  交付检查通过</text>
    </g>
    <rect x="910" y="460" width="238" height="70" rx="14" fill="#132d3a"/>
    <text x="1029" y="489" fill="#7ee7c4" font-size="16" font-weight="700" text-anchor="middle">bilingual.mp4</text>
    <text x="1029" y="513" fill="#9cb4c2" font-size="14" text-anchor="middle">cover.jpg · bilingual.srt</text>
  </g>
</svg>
